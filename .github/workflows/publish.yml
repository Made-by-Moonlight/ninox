name: Publish to crates.io

# Publishes ninox-core, ninox-server, and ninox (the native app binary crate)
# to crates.io in dependency order using crates.io Trusted Publishing (OIDC)
# — no long-lived CARGO_REGISTRY_TOKEN secret required.
#
# Trigger: every push to main (i.e. on merge), a `v*` tag push, or manual
# workflow_dispatch. Each crate is only actually published if its current
# Cargo.toml version isn't already live on crates.io, so merges that don't
# bump a version are a no-op — bump a crate's version in the PR you want
# released.
#
# One-time setup per crate (crates.io Trusted Publishing):
#   1. From https://crates.io/crates/new, add a "pending" trusted publisher
#      for each crate name (ninox-core, ninox-server, ninox) — this works
#      even before the crate has ever been published.
#   2. For each, configure a GitHub publisher:
#        Repository owner:  Made-by-Moonlight
#        Repository name:   ninox
#        Workflow filename: publish.yml
#        Environment:       (leave blank)
#   3. The account that configures this becomes the crate owner on first
#      successful publish from this workflow.
#
# Publish order matters: ninox-server depends on ninox-core, and ninox
# depends on both. Each step waits for its crate to become visible in the
# crates.io index before the next dependent crate publishes.

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # crates.io trusted publishing via OIDC

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libxkbcommon-dev \
            libwayland-dev \
            pkg-config

      - name: Install wait-for-crate helper
        run: |
          cat <<'SCRIPT' > /tmp/wait-for-crate.sh
          #!/usr/bin/env bash
          set -euo pipefail
          crate="$1"
          version="$2"
          for i in $(seq 1 30); do
            if curl -sf "https://crates.io/api/v1/crates/${crate}/${version}" > /dev/null; then
              echo "${crate} ${version} is live."
              exit 0
            fi
            echo "Waiting for ${crate} ${version} to appear (attempt ${i})..."
            sleep 10
          done
          echo "Timed out waiting for ${crate} ${version}." >&2
          exit 1
          SCRIPT
          chmod +x /tmp/wait-for-crate.sh

      - name: Determine publish plan
        id: plan
        run: |
          set -euo pipefail
          metadata=$(cargo metadata --no-deps --format-version 1)
          for entry in core:ninox-core server:ninox-server app:ninox; do
            key="${entry%%:*}"
            crate="${entry##*:}"
            version=$(echo "$metadata" | jq -r --arg n "$crate" '.packages[] | select(.name==$n) | .version')
            echo "${key}_version=${version}" >> "$GITHUB_OUTPUT"
            if curl -sf "https://crates.io/api/v1/crates/${crate}/${version}" > /dev/null; then
              echo "${crate} ${version} is already published — skipping."
              echo "${key}_publish=false" >> "$GITHUB_OUTPUT"
            else
              echo "${crate} ${version} is not yet published — will publish."
              echo "${key}_publish=true" >> "$GITHUB_OUTPUT"
            fi
          done

      - name: Authenticate to crates.io (ninox-core)
        id: auth-core
        if: steps.plan.outputs.core_publish == 'true'
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        with:
          crate: ninox-core

      - name: Publish ninox-core
        if: steps.plan.outputs.core_publish == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth-core.outputs.token }}
        run: |
          cargo publish -p ninox-core
          /tmp/wait-for-crate.sh ninox-core "${{ steps.plan.outputs.core_version }}"

      - name: Authenticate to crates.io (ninox-server)
        id: auth-server
        if: steps.plan.outputs.server_publish == 'true'
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        with:
          crate: ninox-server

      - name: Publish ninox-server
        if: steps.plan.outputs.server_publish == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth-server.outputs.token }}
        run: |
          cargo publish -p ninox-server
          /tmp/wait-for-crate.sh ninox-server "${{ steps.plan.outputs.server_version }}"

      - name: Authenticate to crates.io (ninox)
        id: auth-app
        if: steps.plan.outputs.app_publish == 'true'
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        with:
          crate: ninox

      - name: Publish ninox
        if: steps.plan.outputs.app_publish == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth-app.outputs.token }}
        run: cargo publish -p ninox
