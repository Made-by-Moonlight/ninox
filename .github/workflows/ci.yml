name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Clippy + Test
    # This file is mirrored byte-for-byte to the public repo (see
    # publish-codeartifact.yml's header) with no `if: github.repository`
    # gates, so per-repo runner selection has to come from a repo variable
    # rather than a hardcoded label: RUNNER_LABEL is unset on the public
    # repo (falls back to ubuntu-latest) and set to the ARC runner type
    # (e.g. "build") on the private Synthesia-Technologies mirror, which
    # has access to the org's self-hosted runner infra that the public
    # repo does not.
    runs-on: ${{ vars.RUNNER_LABEL && fromJSON(format('["self-hosted","{0}"]', vars.RUNNER_LABEL)) || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            tmux \
            libgtk-3-dev \
            libxkbcommon-dev \
            libwayland-dev \
            pkg-config
      - name: Cache Rust
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: tmux start-server && cargo test --workspace

  bundle-macos:
    name: macOS App Bundle
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Cache Rust
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            ~/Library/Caches/ort.pyke.io
            target
          # v2: the cache key must change whenever the cached *paths* change
          # (not just Cargo.lock) — bumping straight to a new key here forces
          # this run to do a full rebuild that actually re-executes the
          # `ort-sys` build script and repopulates `~/Library/Caches/ort.pyke.io`
          # from scratch, rather than restoring the old `v1` cache (which
          # never captured that directory) and skipping the build script
          # because its `target/` fingerprint looks up to date — the actual
          # bug behind the "library 'clang_rt.osx' not found" / missing
          # ort.pyke.io search-path link failures.
          key: ${{ runner.os }}-cargo-bundle-v2-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-bundle-v2-
      - name: Build, sign & verify Ninox.app
        uses: ./.github/actions/build-macos-bundle
        with:
          zip: "false"
