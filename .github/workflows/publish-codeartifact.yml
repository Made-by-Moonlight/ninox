name: Publish to CodeArtifact

# Private-registry counterpart to publish.yml (crates.io). This repo is
# mirrored to a second, private remote that isn't linked from here. Both
# remotes carry an identical copy of every workflow file (mirrored history,
# no `if: github.repository == ...` gates anywhere). Per-repo behavior comes
# entirely from repo settings, not YAML conditions:
#   - this (public) repo:  this workflow is disabled
#                           (`gh workflow disable publish-codeartifact.yml`)
#   - the private mirror:  publish.yml and release.yml are disabled
#                           (`gh workflow disable publish.yml`,
#                            `gh workflow disable release.yml`)
#                           ci.yml and this workflow stay enabled.
#
# As belt-and-braces on top of that disable scheme, this workflow also no-ops
# gracefully (see "Check CodeArtifact configuration" below) if its required
# repo variables aren't set — so even an accidental re-enable on the wrong
# repo does nothing.
#
# Publishes ninox-core, ninox-server, and ninox (the native app binary crate)
# to a private Cargo registry hosted on AWS CodeArtifact, in dependency
# order, using GitHub OIDC to assume an AWS IAM role — no long-lived AWS
# keys stored in this repo. Each crate is only actually published if its
# current Cargo.toml version isn't already live in the CodeArtifact
# repository, so merges that don't bump a version are a no-op — bump a
# crate's version in the PR you want released, same as publish.yml.
#
# Required repo variables (Settings → Secrets and variables → Actions →
# Variables), all unset by default so this workflow no-ops until configured:
#   AWS_REGION                    AWS region of the CodeArtifact domain
#   CODEARTIFACT_DOMAIN           the CodeArtifact domain name
#   CODEARTIFACT_DOMAIN_OWNER     AWS account ID that owns the domain
#   CODEARTIFACT_REPOSITORY       the CodeArtifact repository name — this
#                                 also becomes the Cargo registry name used
#                                 by `cargo publish --registry`
#   CODEARTIFACT_PUBLISH_ROLE_ARN ARN of the IAM role this workflow assumes
#                                 via OIDC (a plain repo variable is fine —
#                                 role ARNs aren't secret; a repo secret of
#                                 the same name also works if preferred)
#
# One-time setup needed on the private mirror before this can publish
# anything: a CodeArtifact repository that accepts the "cargo" package
# format, an IAM role that trusts this repo's GitHub OIDC identity and is
# scoped to publish into that repository, and the five repo variables above
# set to the real values. This workflow only reads those variables — it
# never assumes or hardcodes any particular AWS account, domain, or role.
#
# Auth flow: aws-actions/configure-aws-credentials assumes the IAM role via
# OIDC, then the "Configure Cargo for CodeArtifact" step wires Cargo up by
# hand — `aws codeartifact login` has no cargo tool, so it writes
# ~/.cargo/config.toml itself (sparse index + cargo:token credential
# provider) and feeds `cargo login` an auth token from
# `aws codeartifact get-authorization-token`. That step also replaces the
# crates-io source with the CodeArtifact repository, so dependency
# resolution during publish verification goes through CodeArtifact too:
# already-published ninox crates come from the repository itself (the
# package-group origin controls block them from the crates.io upstream)
# and third-party crates come through the crates.io pull-through cache.

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # AWS OIDC — no long-lived credentials

concurrency:
  group: publish-codeartifact
  cancel-in-progress: false

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    env:
      CODEARTIFACT_DOMAIN: ${{ vars.CODEARTIFACT_DOMAIN }}
      CODEARTIFACT_DOMAIN_OWNER: ${{ vars.CODEARTIFACT_DOMAIN_OWNER }}
      CODEARTIFACT_REPOSITORY: ${{ vars.CODEARTIFACT_REPOSITORY }}
      AWS_REGION: ${{ vars.AWS_REGION }}
      CODEARTIFACT_PUBLISH_ROLE_ARN: ${{ vars.CODEARTIFACT_PUBLISH_ROLE_ARN }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Check CodeArtifact configuration
        id: config
        run: |
          if [ -z "$CODEARTIFACT_DOMAIN" ] || [ -z "$CODEARTIFACT_DOMAIN_OWNER" ] || \
             [ -z "$CODEARTIFACT_REPOSITORY" ] || [ -z "$AWS_REGION" ] || \
             [ -z "$CODEARTIFACT_PUBLISH_ROLE_ARN" ]; then
            echo "::notice::CodeArtifact publishing isn't configured on this repository (one or more of AWS_REGION, CODEARTIFACT_DOMAIN, CODEARTIFACT_DOMAIN_OWNER, CODEARTIFACT_REPOSITORY, CODEARTIFACT_PUBLISH_ROLE_ARN repo variables is unset) — skipping. See the header of this workflow for required setup."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.config.outputs.configured == 'true'
        uses: aws-actions/configure-aws-credentials@ec61189d14ec14c8efccab744f656cffd0e33f37 # v6.1.0
        with:
          role-to-assume: ${{ env.CODEARTIFACT_PUBLISH_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          # This session (and the Cargo auth token minted from it, whose
          # lifetime is capped by the session's) has to outlive the whole
          # publish. 1 h is a comfortable budget: the same three-crate
          # verify-and-publish flow takes ~5 min against crates.io on this
          # runner class, and first-time pull-through ingestion doesn't
          # change the order of magnitude.
          role-duration-seconds: 3600

      # A transient AWS error here must not be mistaken for "not published"
      # — that would send the job into a doomed duplicate publish — so only
      # ResourceNotFoundException counts as absent; anything else fails the
      # step.
      - name: Determine publish plan
        id: plan
        if: steps.config.outputs.configured == 'true'
        run: |
          set -euo pipefail
          metadata=$(cargo metadata --no-deps --format-version 1)
          any=false
          for entry in core:ninox-core server:ninox-server app:ninox; do
            key="${entry%%:*}"
            crate="${entry##*:}"
            version=$(echo "$metadata" | jq -r --arg n "$crate" '.packages[] | select(.name==$n) | .version')
            echo "${key}_version=${version}" >> "$GITHUB_OUTPUT"
            if err=$(aws codeartifact describe-package-version \
                --domain "$CODEARTIFACT_DOMAIN" --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
                --repository "$CODEARTIFACT_REPOSITORY" --format cargo \
                --package "${crate}" --package-version "${version}" 2>&1 > /dev/null); then
              echo "${crate} ${version} is already published — skipping."
              echo "${key}_publish=false" >> "$GITHUB_OUTPUT"
            elif grep -q "ResourceNotFoundException" <<< "$err"; then
              echo "${crate} ${version} is not yet published — will publish."
              echo "${key}_publish=true" >> "$GITHUB_OUTPUT"
              any=true
            else
              echo "Unexpected error checking ${crate} ${version}:" >&2
              echo "$err" >&2
              exit 1
            fi
          done
          echo "any_publish=${any}" >> "$GITHUB_OUTPUT"

      # Everything below only matters when something will actually be
      # published, so no-op runs (any main push without a version bump)
      # skip the apt install and never mint registry credentials.
      - name: Install system dependencies
        if: steps.config.outputs.configured == 'true' && steps.plan.outputs.any_publish == 'true'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libxkbcommon-dev \
            libwayland-dev \
            pkg-config

      # Polls the repository's sparse index — the surface the next
      # `cargo publish` actually resolves dependencies from — rather than
      # the control-plane describe-package-version API, which the index can
      # lag behind.
      - name: Install wait-for-crate helper
        if: steps.config.outputs.configured == 'true' && steps.plan.outputs.any_publish == 'true'
        run: |
          cat <<'SCRIPT' > /tmp/wait-for-crate.sh
          #!/usr/bin/env bash
          set -euo pipefail
          crate="$1"
          version="$2"
          endpoint=$(aws codeartifact get-repository-endpoint \
            --domain "$CODEARTIFACT_DOMAIN" --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
            --repository "$CODEARTIFACT_REPOSITORY" --format cargo \
            --query repositoryEndpoint --output text)
          token=$(aws codeartifact get-authorization-token \
            --domain "$CODEARTIFACT_DOMAIN" --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
            --query authorizationToken --output text)
          echo "::add-mask::${token}"
          # Sparse-index path scheme for names of >= 4 characters (all of
          # ours): first two chars / next two chars / full name.
          index_path="${crate:0:2}/${crate:2:2}/${crate}"
          for i in $(seq 1 30); do
            if curl -fsS -H "Authorization: Bearer ${token}" \
                "${endpoint}${index_path}" 2> /dev/null \
                | jq -e -s --arg v "${version}" 'any(.[]; .vers == $v)' > /dev/null; then
              echo "${crate} ${version} is live in the index."
              exit 0
            fi
            echo "Waiting for ${crate} ${version} to appear in the index (attempt ${i})..."
            sleep 10
          done
          echo "Timed out waiting for ${crate} ${version}." >&2
          exit 1
          SCRIPT
          chmod +x /tmp/wait-for-crate.sh

      # `aws codeartifact login` doesn't support cargo as a --tool, so this
      # configures Cargo by hand, following the CodeArtifact cargo docs:
      # a named registry with the repository's sparse index for publishing,
      # crates-io source replacement so dependency resolution during publish
      # verification also goes through CodeArtifact, and a cargo:token
      # credential provider fed by `cargo login` (the registry expects the
      # literal token value "Bearer <auth token>").
      - name: Configure Cargo for CodeArtifact
        if: steps.config.outputs.configured == 'true' && steps.plan.outputs.any_publish == 'true'
        run: |
          set -euo pipefail
          endpoint=$(aws codeartifact get-repository-endpoint \
            --domain "$CODEARTIFACT_DOMAIN" --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
            --repository "$CODEARTIFACT_REPOSITORY" --format cargo \
            --query repositoryEndpoint --output text)
          token=$(aws codeartifact get-authorization-token \
            --domain "$CODEARTIFACT_DOMAIN" --domain-owner "$CODEARTIFACT_DOMAIN_OWNER" \
            --query authorizationToken --output text)
          echo "::add-mask::${token}"
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml <<EOF
          [registries.${CODEARTIFACT_REPOSITORY}]
          index = "sparse+${endpoint}"
          credential-provider = "cargo:token"

          [source.crates-io]
          replace-with = "${CODEARTIFACT_REPOSITORY}"

          [registry]
          global-credential-providers = ["cargo:token"]
          EOF
          printf 'Bearer %s\n' "${token}" | cargo login --registry "$CODEARTIFACT_REPOSITORY"

      - name: Publish ninox-core
        if: steps.config.outputs.configured == 'true' && steps.plan.outputs.core_publish == 'true'
        run: |
          cargo publish -p ninox-core --registry "$CODEARTIFACT_REPOSITORY"
          /tmp/wait-for-crate.sh ninox-core "${{ steps.plan.outputs.core_version }}"

      - name: Publish ninox-server
        if: steps.config.outputs.configured == 'true' && steps.plan.outputs.server_publish == 'true'
        run: |
          cargo publish -p ninox-server --registry "$CODEARTIFACT_REPOSITORY"
          /tmp/wait-for-crate.sh ninox-server "${{ steps.plan.outputs.server_version }}"

      - name: Publish ninox
        if: steps.config.outputs.configured == 'true' && steps.plan.outputs.app_publish == 'true'
        run: cargo publish -p ninox --registry "$CODEARTIFACT_REPOSITORY"
