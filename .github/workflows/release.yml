name: Release

# Auto-release on merge, driven by the angular/conventional commit history.
#
# On every push to main this decides whether a release is due and, if so,
# cuts it end-to-end:
#   1. Gate — application code (crates/, Cargo.toml, Cargo.lock) must have
#      changed since the last release tag. Docs/CI-only merges never release.
#   2. Bump level from the commits since the last v* tag, angular-style:
#      BREAKING CHANGE / `type!:` → major, feat → minor, fix/perf → patch;
#      anything else (chore/docs/ci/refactor/...) doesn't release. While the
#      workspace is 0.x, a breaking change bumps the minor instead (semver
#      0.x convention).
#   3. Bump every workspace crate (ninox-core / ninox-server / ninox) and
#      the inter-crate version pins + Cargo.lock, commit
#      `chore(release): vX.Y.Z` to main, and tag it.
#   4. Create the GitHub release with notes grouped by commit type.
#   5. The pushed version bump triggers publish.yml, which pushes the new
#      versions to crates.io via Trusted Publishing.
#
# The very first run has no v* tag, so the whole history counts — that cut
# the initial automated release covering everything since 0.1.0.
#
# The release commit is pushed over SSH with the RELEASE_DEPLOY_KEY deploy
# key — the "protect main" ruleset requires PRs + green CI on main and
# grants deploy keys bypass, so this workflow's direct push is the one
# sanctioned exception. Deploy-key pushes DO trigger workflows (unlike
# GITHUB_TOKEN pushes), which is what fires publish.yml — and is loop-safe
# here: the release push carries its own v* tag at HEAD, so the re-entrant
# run sees no code changes since that tag and exits at the gate with
# bump=none.

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Cut release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.RELEASE_DEPLOY_KEY }}

      - name: Decide the bump from angular commits
        id: decide
        run: |
          set -euo pipefail
          last_tag=$(git describe --tags --match 'v*' --abbrev=0 2>/dev/null || true)
          range="${last_tag:+$last_tag..}HEAD"
          echo "Last release tag: ${last_tag:-none} — analyzing ${range}"

          # Gate: application code must have changed since the last release.
          if [ -n "$last_tag" ] && git diff --quiet "$last_tag"..HEAD -- crates Cargo.toml Cargo.lock; then
            echo "No application-code changes since ${last_tag} — not releasing."
            echo "bump=none" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          subjects=$(git log --format='%s' "$range")
          bodies=$(git log --format='%b' "$range")

          bump=none
          if grep -qE '^[a-z]+(\([^)]*\))?!: ' <<<"$subjects" || grep -q 'BREAKING CHANGE' <<<"$bodies"; then
            bump=major
          elif grep -qE '^feat(\([^)]*\))?: ' <<<"$subjects"; then
            bump=minor
          elif grep -qE '^(fix|perf)(\([^)]*\))?: ' <<<"$subjects"; then
            bump=patch
          fi
          echo "Bump level: $bump"
          {
            echo "bump=$bump"
            echo "last_tag=$last_tag"
          } >> "$GITHUB_OUTPUT"

      - name: Bump versions, tag, release
        if: steps.decide.outputs.bump != 'none'
        env:
          GH_TOKEN: ${{ github.token }}
          BUMP: ${{ steps.decide.outputs.bump }}
          LAST_TAG: ${{ steps.decide.outputs.last_tag }}
        run: |
          set -euo pipefail
          range="${LAST_TAG:+$LAST_TAG..}HEAD"

          current=$(grep -Eom1 '^version\s*=\s*"[^"]+"' crates/ninox-core/Cargo.toml | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+')
          IFS=. read -r maj min pat <<<"$current"
          case "$BUMP" in
            major)
              # semver 0.x convention: breaking changes bump the minor.
              if [ "$maj" -eq 0 ]; then next="0.$((min+1)).0"; else next="$((maj+1)).0.0"; fi ;;
            minor) next="$maj.$((min+1)).0" ;;
            patch) next="$maj.$min.$((pat+1))" ;;
          esac
          echo "Releasing v$next (was $current, bump: $BUMP)"

          # Crate versions (hand-aligned manifests — preserve the spacing)
          # and the ninox-core/ninox-server pins in dependent crates.
          perl -pi -e "s/^version(\s+)= \"\Q$current\E\"/version\${1}= \"$next\"/" \
            crates/ninox-core/Cargo.toml crates/ninox-server/Cargo.toml crates/ninox-app/Cargo.toml
          perl -pi -e "s/(ninox-(?:core|server)\s*=\s*\{[^}]*version = )\"\Q$current\E\"/\${1}\"$next\"/" \
            crates/ninox-server/Cargo.toml crates/ninox-app/Cargo.toml
          cargo update --workspace

          # Release notes grouped angular-style.
          {
            breaking=$( (git log --format='- %s' "$range" | grep -E '^- [a-z]+(\([^)]*\))?!: ' || true) )
            [ -n "$breaking" ] && printf '### Breaking\n%s\n\n' "$breaking"
            for entry in 'feat:Features' 'fix:Fixes' 'perf:Performance'; do
              type="${entry%%:*}"; title="${entry##*:}"
              lines=$( (git log --format='- %s' "$range" | grep -E "^- ${type}(\([^)]*\))?: " | sed -E "s/^- ${type}(\([^)]*\))?: /- /" || true) )
              [ -n "$lines" ] && printf '### %s\n%s\n\n' "$title" "$lines"
            done
          } > /tmp/release-notes.md

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "chore(release): v$next"
          git tag "v$next"
          # If main moved while this job ran, fail here and let the next
          # merge's run pick the release up instead of force-pushing.
          git push origin main "v$next"

          gh release create "v$next" --title "v$next" \
            --notes-file /tmp/release-notes.md --generate-notes
